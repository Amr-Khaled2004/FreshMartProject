<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshMart | Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo">FreshMart</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart <span id="cart-count">0</span></a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <section class="form-section">
    <form id="registerForm" class="form-box">
      <h2>Create Account</h2>

      <input type="text" id="registerName" placeholder="Full Name" required />
      <input type="email" id="registerEmail" placeholder="Email Address" required />
      <input type="password" id="registerPassword" placeholder="Password" required />

      <button type="submit" class="btn full">Register</button>

      <p>Already have an account? <a href="login.html">Login</a></p>
      <p id="registerMessage" class="message"></p>
    </form>
  </section>

  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
